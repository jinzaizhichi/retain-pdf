name: Desktop Frontend Sync

"on":
  pull_request:
    paths:
      - ".github/workflows/desktop-frontend-sync.yml"
      - ".githooks/pre-commit"
      - "desktop/package.json"
      - "desktop/package-lock.json"
      - "desktop/scripts/prepare-app.mjs"
      - "desktop/scripts/check-frontend-bundle.mjs"
      - "frontend/**"
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/desktop-frontend-sync.yml"
      - ".githooks/pre-commit"
      - "desktop/package.json"
      - "desktop/package-lock.json"
      - "desktop/scripts/prepare-app.mjs"
      - "desktop/scripts/check-frontend-bundle.mjs"
      - "frontend/**"
  workflow_dispatch: {}

jobs:
  desktop-frontend-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: |
            desktop/package-lock.json
            frontend/package-lock.json

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Verify desktop frontend generation
        env:
          RETAIN_PDF_DESKTOP_PLATFORM: linux
          RETAIN_PDF_SKIP_BUNDLED_RUNTIME_VERIFICATION: "1"
        run: npm --prefix desktop run verify-frontend-sync

      - name: Check tracked generated files are up to date
        run: |
          git diff --exit-code -- \
            frontend/styles.css \
            desktop/build/icons \
            desktop/package.json
