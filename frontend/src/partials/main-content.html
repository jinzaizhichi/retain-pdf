<main id="app-shell" class="page app-shell">
  <app-shell-header></app-shell-header>

  <section id="library-view" class="library-view" aria-label="图书馆">
    <div id="recent-jobs-scroll-body" class="library-scroll-body">
      <div id="recent-jobs-summary" class="status-panel-note library-summary">Stage Spec 0 · Unknown 0</div>
      <div id="recent-jobs-empty" class="events-empty hidden">暂无最近任务</div>
      <div id="library-grid" class="recent-jobs-list library-grid">
        <div id="recent-jobs-list" class="recent-jobs-list library-grid hidden"></div>
      </div>
      <div class="recent-jobs-more-row">
        <button id="load-more-jobs-btn" class="secondary hidden" type="button">更多</button>
      </div>
    </div>
  </section>

  <button id="open-query-btn" type="button" class="secondary hidden" aria-hidden="true">最近任务</button>
  <div class="library-search-bar" role="search">
    <input id="library-search-input" type="search" autocomplete="off" placeholder="搜索书籍" aria-label="搜索书籍" />
  </div>

  <recent-jobs-dialog></recent-jobs-dialog>
  <div id="translation-workflow-dialog" class="translation-workflow-dialog hidden" role="dialog" aria-modal="true" aria-labelledby="translation-workflow-title">
    <div class="desktop-shell translation-workflow-shell">
      <div class="translation-workflow-head">
        <h2 id="translation-workflow-title">翻译 PDF</h2>
        <button id="translation-workflow-close-btn" type="button" class="dialog-close-btn" aria-label="关闭">×</button>
      </div>
      <section class="translation-workflow-card">
        <div id="job-warning" class="job-warning hidden">检测到上一个任务仍在处理中。建议先等待当前任务结束，再提交新的 PDF。</div>

        <form id="job-form" class="form" novalidate>
          <input id="ocr_provider" name="ocr_provider" type="hidden" value="paddle" />
          <input id="mineru_token" name="mineru_token" type="hidden" value="" />
          <input id="paddle_token" name="paddle_token" type="hidden" value="" />
          <input id="api_key" name="api_key" type="hidden" value="" />

          <div class="upload-tile upload-tile-hero">
            <input id="file" name="file" type="file" accept="application/pdf,.pdf" />
            <span id="upload-fill" class="upload-fill" aria-hidden="true"></span>
            <div id="credential-gate" class="credential-gate hidden">
              <div class="credential-gate-panel" aria-live="polite">
                <span class="credential-gate-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none">
                    <path d="M8 11V8a4 4 0 1 1 8 0v3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    <rect x="5" y="11" width="14" height="10" rx="3" stroke="currentColor" stroke-width="1.5"/>
                    <circle cx="12" cy="16" r="1.2" fill="currentColor"/>
                  </svg>
                </span>
                <strong id="credential-gate-title">请先完成接口设置</strong>
                <em id="credential-gate-help">填写 OCR Token 和 DeepSeek Key 后即可上传 PDF。</em>
                <button id="credential-gate-action" type="button" class="credential-gate-action">去设置接口</button>
              </div>
            </div>
            <span id="upload-glyph" class="upload-glyph" aria-hidden="true">
              <span class="upload-glyph-h"></span>
              <span class="upload-glyph-v"></span>
            </span>
            <strong id="file-label">添加 PDF</strong>
            <em id="upload-help">上传后会先完成文件校验，再进入任务处理。</em>
            <div class="upload-meta upload-meta-inline">
              <span>单个 PDF</span>
              <span>最大 50MB</span>
              <span>最多 999 页</span>
            </div>
            <div id="upload-status" class="upload-status hidden">尚未选择文件</div>
            <div id="upload-progress-panel" class="upload-progress-panel hidden" aria-live="polite">
              <span id="upload-progress-text">上传中</span>
            </div>
            <div id="inline-page-range" class="inline-page-range hidden" aria-label="翻译页码范围">
              <label>
                <span>起始页</span>
                <input id="page-range-start" type="number" min="1" step="1" inputmode="numeric" autocomplete="off" placeholder="1" />
              </label>
              <label>
                <span>结束页</span>
                <input id="page-range-end" type="number" min="1" step="1" inputmode="numeric" autocomplete="off" placeholder="总页数" />
              </label>
            </div>
            <div id="translation-budget-note" class="translation-budget-note hidden" aria-live="polite"></div>
            <div id="upload-action-slot" class="upload-action-slot hidden">
              <div class="upload-action-group">
                <button id="page-range-btn" type="button" class="page-range-mini secondary" aria-label="专业翻译" title="专业翻译">专业翻译</button>
                <button id="submit-btn" type="submit" disabled>开始翻译</button>
              </div>
            </div>
          </div>
          <inline-error-box id="error-box-inline" class="hidden">-</inline-error-box>
        </form>
      </section>
      <section id="status-section" class="translation-status-panel hidden" aria-label="任务进度">
        <job-status-card id="job-status-card"></job-status-card>
      </section>
    </div>
  </div>
</main>
